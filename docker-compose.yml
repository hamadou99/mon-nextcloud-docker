

services:


  db:
    image: postgres:16
    container_name: nextcloud_db
    restart: always
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: nextcloud_secret
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextcloud"]
      interval: 10s
      timeout: 5s
      retries: 5


  redis:
    image: redis:7-alpine
    container_name: nextcloud_redis
    restart: always
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5


  nextcloud:
    image: nextcloud:29-apache
    container_name: nextcloud_app
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - nextcloud_data:/var/www/html
    environment:

      POSTGRES_HOST: db
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: nextcloud_secret


      REDIS_HOST: redis
      REDIS_HOST_PORT: 6379


      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: admin_secret
      NEXTCLOUD_TRUSTED_DOMAINS: localhost nextcloud nginx


      COLLABORA_URL: http://collabora:9980
    networks:
      - internal


  collabora:
    image: collabora/code:latest
    container_name: nextcloud_collabora
    restart: always
    environment:
      aliasgroup1: http://nextcloud:80
      DONT_GEN_SSL_CERT: "YES"
      extra_params: --o:ssl.enable=false --o:ssl.termination=true
    networks:
      - internal
    cap_add:
      - MKNOD


  cron:
    image: nextcloud:29-apache
    container_name: nextcloud_cron
    restart: always
    volumes:
      - nextcloud_data:/var/www/html
    entrypoint: /cron.sh
    depends_on:
      - nextcloud
    networks:
      - internal


  nginx:
    image: nginx:alpine
    container_name: nextcloud_nginx
    restart: always
    ports:
      - "80:80"
      # - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - nextcloud
      - collabora
    networks:
      - internal
      - external


networks:
  internal:
    driver: bridge
    internal: true
  external:
    driver: bridge


volumes:
  db_data:
  nextcloud_data:
